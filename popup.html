<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notesy</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body class="light-mode">
    <header class="toolbar">
        <div class="logo-section">
            <h1 class="logo">Notesy</h1>
            <span id="save-status" class="status-indicator hide">Saved</span>
        </div>
        <div class="action-group">
            <button id="theme-toggle" title="Toggle Dark Mode" class="icon-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            </button>
            <button id="clear-notes" title="Clear All" class="icon-btn danger">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </button>
        </div>
    </header>

    <nav class="formatting-bar">
        <select id="format-block" class="format-select">
            <option value="p">Normal Text</option>
            <option value="h4">Heading 4</option>
            <option value="blockquote">Quote</option>
            <option value="pre">Code Block</option>
        </select>
        <div class="v-divider"></div>
        <select id="align-block" class="format-select">
            <option value="justifyLeft">Left</option>
            <option value="justifyCenter">Center</option>
            <option value="justifyRight">Right</option>
            <option value="justifyFull">Justify</option>
        </select>
        <div class="v-divider"></div>
        <button class="format-btn" data-command="bold" title="Bold"><b>B</b></button>
        <button class="format-btn" data-command="italic" title="Italic"><i>I</i></button>
        <button class="format-btn" data-command="fontName" data-value="monospace" title="Monospace">M</button>
        <div class="v-divider"></div>
        <button class="format-btn" data-command="insertUnorderedList" title="Bullets">•</button>
        <button class="format-btn" data-command="insertOrderedList" title="Numbers">1.</button>
        <button class="format-btn" data-command="removeFormat" title="Clear Formatting"><u>T</u>x</button>
        <div class="v-divider"></div>
        <button id="insert-timestamp" class="format-btn" title="Timestamp">Time</button>
    </nav>

    <main class="editor-container">
        <div id="notes-area" contenteditable="true" placeholder="Start typing your notes..."></div>
    </main>

    <footer class="footer">
        <div class="stats-row">
            <span id="word-count">0 words</span>
        </div>
        <div class="export-container">
            <input type="text" id="filename-input" placeholder="Filename (optional)" class="filename-field">
            <div class="export-actions">
                <button id="download-pdf" class="btn secondary">PDF</button>
                <button id="download-docx" class="btn primary">DOCX</button>
            </div>
        </div>
    </footer>

    <!-- Libraries -->
    <script src="libs/jspdf.umd.min.js"></script>
    <script src="libs/docx.umd.js"></script>
    <script src="libs/FileSaver.min.js"></script>

    <!-- App Logic -->
    <script src="utils/exportPDF.js"></script>
    <script src="utils/exportDOCX.js"></script>
    <script src="popup.js"></script>
</body>
</html>
